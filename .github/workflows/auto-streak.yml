name: Maintain GitHub Streak

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  auto-streak:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Run Auto-Streak Keeper
        uses: bmiit145/auto-streak-keeper@v1.0.2
        with:
          file-path: "public/auto-streak/data.txt"
          min-commits: 2
          max-commits: 5
          commit-message: "Daily streak maintenance"
          user-name: "salim1334"
          user-email: "salimahmedmuhammed98765@gmail.com"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          branch-name: "main"
